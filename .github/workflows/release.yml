name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        shell: pwsh
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git -c credential.helper= -c http.extraheader= fetch --no-tags --depth=1 origin "+${{ github.ref }}:${{ github.ref }}"
          git checkout --detach "${{ github.sha }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download bundled beellama runtime
        shell: pwsh
        run: |
          $runtimeDir = Join-Path $PWD "tools/beellama-v0.2.0-cuda12.4"
          $binZip = Join-Path $env:RUNNER_TEMP "beellama-v0.2.0-bin-win-cuda-12.4-x64.zip"
          $cudaZip = Join-Path $env:RUNNER_TEMP "cudart-llama-bin-win-cuda-12.4-x64.zip"

          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          Invoke-WebRequest -Uri "https://github.com/Anbeeld/beellama.cpp/releases/download/v0.2.0/beellama-v0.2.0-bin-win-cuda-12.4-x64.zip" -OutFile $binZip
          Invoke-WebRequest -Uri "https://github.com/Anbeeld/beellama.cpp/releases/download/v0.2.0/cudart-llama-bin-win-cuda-12.4-x64.zip" -OutFile $cudaZip
          Expand-Archive -Path $binZip -DestinationPath $runtimeDir -Force
          Expand-Archive -Path $cudaZip -DestinationPath $runtimeDir -Force

      - name: Build Windows release
        run: npm run build && npx electron-builder --config electron-builder.config.cjs --win nsis --x64 --publish never

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }
          "target=${{ github.sha }}" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TARGET: ${{ steps.release_meta.outputs.target }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $owner = "${{ github.repository_owner }}"
          $repo = "${{ github.event.repository.name }}"
          $encodedTag = [uri]::EscapeDataString($env:RELEASE_TAG)
          $releaseBody = @{
            tag_name = $env:RELEASE_TAG
            target_commitish = $env:RELEASE_TARGET
            name = $env:RELEASE_TAG
            draft = $false
            prerelease = $false
            generate_release_notes = $true
          } | ConvertTo-Json
          $releaseUpdateBody = @{
            tag_name = $env:RELEASE_TAG
            target_commitish = $env:RELEASE_TARGET
            name = $env:RELEASE_TAG
            draft = $false
            prerelease = $false
          } | ConvertTo-Json

          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$encodedTag" -Headers $headers
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -ne 404) {
              throw
            }
            $release = Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/$owner/$repo/releases" -Headers $headers -Body $releaseBody -ContentType "application/json"
          }

          $files = Get-ChildItem -Path "dist" -Filter "망가번역기 Setup *.exe"
          if (-not $files) {
            throw "No Windows installer matched dist/망가번역기 Setup *.exe"
          }

          $release = Invoke-RestMethod -Method Patch -Uri "https://api.github.com/repos/$owner/$repo/releases/$($release.id)" -Headers $headers -Body $releaseUpdateBody -ContentType "application/json"
          foreach ($asset in $release.assets) {
            if ($asset.name -like "*.exe") {
              Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/$owner/$repo/releases/assets/$($asset.id)" -Headers $headers
              Write-Host "Deleted existing asset $($asset.name)"
            }
          }

          $uploadUrl = $release.upload_url -replace "\{\?name,label\}", ""
          foreach ($file in $files) {
            $encodedName = [uri]::EscapeDataString($file.Name)
            $assetUploadUri = "$($uploadUrl)?name=$encodedName"
            Invoke-RestMethod `
              -Method Post `
              -Uri $assetUploadUri `
              -Headers $headers `
              -ContentType "application/octet-stream" `
              -InFile $file.FullName `
              -TimeoutSec 3600
            Write-Host "Uploaded $($file.Name)"
          }
