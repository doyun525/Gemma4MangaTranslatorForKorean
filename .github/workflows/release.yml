name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to create or update (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download bundled llama runtime
        shell: pwsh
        run: |
          $runtimeDir = Join-Path $PWD "tools/llama-b8833-cuda12.4"
          $binZip = Join-Path $env:RUNNER_TEMP "llama-b8833-bin-win-cuda-12.4-x64.zip"
          $cudaZip = Join-Path $env:RUNNER_TEMP "cudart-llama-bin-win-cuda-12.4-x64.zip"

          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          Invoke-WebRequest -Uri "https://github.com/ggml-org/llama.cpp/releases/download/b8833/llama-b8833-bin-win-cuda-12.4-x64.zip" -OutFile $binZip
          Invoke-WebRequest -Uri "https://github.com/ggml-org/llama.cpp/releases/download/b8833/cudart-llama-bin-win-cuda-12.4-x64.zip" -OutFile $cudaZip
          Expand-Archive -Path $binZip -DestinationPath $runtimeDir -Force
          Expand-Archive -Path $cudaZip -DestinationPath $runtimeDir -Force

      - name: Build Windows release
        run: npm run build && npx electron-builder --config electron-builder.config.cjs --win nsis --x64 --publish never

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag_name }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }
          "target=${{ github.sha }}" >> $env:GITHUB_OUTPUT

      - name: Remove existing Windows installer assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $owner = "${{ github.repository_owner }}"
          $repo = "${{ github.event.repository.name }}"
          $encodedTag = [uri]::EscapeDataString($env:RELEASE_TAG)

          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$owner/$repo/releases/tags/$encodedTag" -Headers $headers
          } catch {
            $statusCode = $_.Exception.Response.StatusCode.value__
            if ($statusCode -eq 404) {
              Write-Host "Release $env:RELEASE_TAG does not exist yet."
              exit 0
            }
            throw
          }

          foreach ($asset in $release.assets) {
            if ($asset.name -like "망가번역기 Setup *") {
              Invoke-RestMethod -Method Delete -Uri "https://api.github.com/repos/$owner/$repo/releases/assets/$($asset.id)" -Headers $headers
              Write-Host "Deleted existing asset $($asset.name)"
            }
          }

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ steps.release_meta.outputs.target }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/망가번역기 Setup *.exe
